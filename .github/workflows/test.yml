# GitHub repository configuration

## Workflow files

name: Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install Clarinet
        run: npm install --global @hirosystems/clarinet
      - name: Install Dependencies
        run: npm ci
      - name: Run contract check & unit tests
        run: npm run test
      - name: Check Contracts
        run: clarinet check
